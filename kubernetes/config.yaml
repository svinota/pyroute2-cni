---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frr-config
  namespace: pyroute2-cni
data:
  frr.conf.tpl: |
    !
    frr defaults traditional
    hostname $node_name
    no ipv6 forwarding
    service integrated-vtysh-config
    !
    $vrf_sections
    !
    router bgp 65000
     bgp router-id $router_id
     no bgp default ipv4-unicast
     neighbor RR peer-group
     neighbor RR remote-as 65000
     neighbor $rr_ip peer-group RR
     !
     address-family ipv4 unicast
      network $router_id/32
     exit-address-family
     !
     address-family l2vpn evpn
      neighbor RR activate
      advertise-all-vni
      advertise ipv4 unicast
     exit-address-family
    exit
    !
    $vrf_router_sections
    !
    end
  vtysh.conf: |
    service integrated-vtysh-config
  daemons: |
    bgpd=yes
    ospfd=no
    ospf6d=no
    ripd=no
    ripngd=no
    isisd=no
    pimd=no
    pim6d=no
    ldpd=no
    nhrpd=no
    eigrpd=no
    babeld=no
    sharpd=no
    pbrd=no
    bfdd=no
    fabricd=no
    vrrpd=no
    pathd=no
    vtysh_enable=yes
    zebra_options="  -A 127.0.0.1 -s 90000000"
    bgpd_options="   -A 127.0.0.1"
    ospfd_options="  -A 127.0.0.1"
    ospf6d_options=" -A ::1"
    ripd_options="   -A 127.0.0.1"
    ripngd_options=" -A ::1"
    isisd_options="  -A 127.0.0.1"
    pimd_options="   -A 127.0.0.1"
    pim6d_options="  -A ::1"
    ldpd_options="   -A 127.0.0.1"
    nhrpd_options="  -A 127.0.0.1"
    eigrpd_options=" -A 127.0.0.1"
    babeld_options=" -A 127.0.0.1"
    sharpd_options=" -A 127.0.0.1"
    pbrd_options="   -A 127.0.0.1"
    staticd_options="-A 127.0.0.1"
    bfdd_options="   -A 127.0.0.1"
    fabricd_options="-A 127.0.0.1"
    vrrpd_options="  -A 127.0.0.1"
    pathd_options="  -A 127.0.0.1"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: server-config
  namespace: pyroute2-cni
data:
  server.ini: |
    [api]
    socket_path_api = /var/run/pyroute2/api
    socket_path_fd = /var/run/pyroute2/fdpass

    [network]
    host_if = enp1s0
    rr_ip = 192.168.124.1

    [default]
    prefix = 10.244.0.0
    prefixlen = 16
    ipblocklen = 26
    vxlan = 42
    vrf = 42
    service_vrf_max = 512
    srv6end = fc00:100:$host_order::$vrf_table:a
    srv6endDT4 = fc00:100:$host_order::$vrf_table:b
    srv6local = fc00:200:1:$host_order::5

    [plan9]
    port = 8149

    [mdns]
    service = _9p2r._tcp.local.

    [topology]
    template = ""

  segment.dot: |
    digraph G {

        node [fillcolor="#ffffff", style=filled]

        subgraph cluster_v0 {
            label="K8S namespace $namespace\nVRF domain $vrf_ifname";
            type=vrf;
            table=$vrf_table;
            ifname="$vrf_ifname";
            bgcolor="#f0f0f0";

            subgraph cluster_n0 {
                label="$pod_name";
                type=netns;
                bgcolor="#c0c0c0";
                fd="$net_ns_fd";

                "port0" [type=interface, kind=veth, label="eth0", mtu="1440", sysctl="?brport/hairpin_mode=1", key=2];
                "port0" -> "port0:ip" [style=dashed, dir=none];
                "port0:ip" [
                    shape=note,
                    label="$veth_ipaddr",
                    fontsize=8,
                ];
            }

            "br0" [type=interface, kind=bridge, label="$br_ifname"];
            "br0" -> "br0:ip" [style=dashed, dir=none];
            "br0:ip" [
                shape=note,
                label="$br_ipaddr",
                fontsize=8,
            ];
            "br0:route" [shape=note, label="$prefix/$prefixlen"];
            "br0" -> "br0:route";

            "port0" -> "br0";
        }

        "vxlan" [
            type=interface,
            kind=vxlan,
            label="$vxlan_ifname",
            vxlan_id=$vxlan_id,
            vxlan_group="239.1.1.1",
        ];
        "vxlan" -> "br0";
        "vxlan" -> "$host_ifname" [style=dashed, dir=none];
    }
