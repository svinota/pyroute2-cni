apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ipblocks.ipam.pyroute2.org
spec:
  group: ipam.pyroute2.org
  scope: Cluster
  names:
    plural: ipblocks
    singular: ipblock
    kind: IPBlock
    shortNames:
      - ipb
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: CIDR
          type: string
          jsonPath: .spec.cidr
        - name: Node
          type: string
          jsonPath: .spec.nodeName
        - name: VRF
          type: integer
          jsonPath: .spec.vrfTable
        - name: VNI
          type: integer
          jsonPath: .spec.vxlanId
        - name: Allocated
          type: integer
          jsonPath: .status.allocated
        - name: Capacity
          type: integer
          jsonPath: .status.capacity
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              type: object
              required: ["cidr", "nodeName", "vrfTable", "vxlanId"]
              properties:
                cidr:
                  type: string
                  description: "CIDR of the block, e.g. 10.244.1.0/26"
                nodeName:
                  type: string
                  description: "Owner node name"
                vrfTable:
                  type: integer
                  description: "VRF table id"
                vxlanId:
                  type: integer
                  description: "VNI / VXLAN id"
            status:
              type: object
              properties:
                allocated:
                  type: integer
                  description: "Allocated addresses"
                capacity:
                  type: integer
                  description: "Total block capacity"
                allocations:
                  type: object
                  description: "map[ip] -> reference"
                  additionalProperties:
                    type: string
      subresources:
        status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vrfdomains.cni.pyroute2.org
spec:
  group: cni.pyroute2.org
  scope: Cluster
  names:
    plural: vrfdomains
    singular: vrfdomain
    kind: VRFDomain
    shortNames:
      - vrd
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: VRF
          type: integer
          jsonPath: .spec.vrf
        - name: Table
          type: integer
          jsonPath: .status.table
        - name: Prefix
          type: string
          jsonPath: .spec.prefix
        - name: PrefixLen
          type: integer
          jsonPath: .spec.prefixlen
        - name: IPBlockLen
          type: integer
          jsonPath: .spec.ipblocklen
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              type: object
              required: ["vrf", "attachments"]
              properties:
                vrf:
                  type: integer
                  description: "VRF id"
                table:
                  type: integer
                  description: "Routing table id"
                prefix:
                  type: string
                  description: "Pod network prefix"
                prefixlen:
                  type: integer
                  description: "Pod network prefix length"
                ipblocklen:
                  type: integer
                  description: "IPBlock sub-prefix length"
                attachments:
                  type: array
                  items:
                    type: object
                    required: ["type"]
                    properties:
                      type:
                        type: string
                        enum: ["l2vni", "l3vni"]
                        description: "Attachment type to be deployed in the VRF"
                      vni:
                        type: integer
                        description: "VXLAN network identifier"
                      dev:
                        type: string
                        description: "Host device"
                      local:
                        type: string
                        description: "VXLAN local VTEP"
                      port:
                        type: integer
                        description: "VXLAN port"
      subresources:
        status: {}
