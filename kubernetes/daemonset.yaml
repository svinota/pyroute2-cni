---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: pyroute2-cni
  namespace: pyroute2-cni
  labels:
    tier: node
    app: pyroute2-cni
    k8s-app: pyroute2-cni
spec:
  selector:
    matchLabels:
      app: pyroute2-cni
  template:
    metadata:
      labels:
        tier: node
        app: pyroute2-cni
    spec:
      serviceAccountName: pyroute2-cni-sa
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/os
                operator: In
                values:
                - linux
      hostNetwork: true
      priorityClassName: system-node-critical
      tolerations:
      - operator: Exists
        effect: NoSchedule
      containers:
      - name: pyroute2-cni
        image: ghcr.io/svinota/pyroute2-cni:0.0.390
        resources:
          requests:
            cpu: "100m"
            memory: "100Mi"
        securityContext:
          privileged: true
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        volumeMounts:
        - name: host-root
          mountPath: /host
        - name: pyroute2-run
          mountPath: /var/run/pyroute2
        - name: server-config
          mountPath: /pyroute2-cni/config
      volumes:
      - name: host-root
        hostPath:
          path: /
      - name: pyroute2-run
        hostPath:
          path: /var/run/pyroute2
          type: DirectoryOrCreate
      - name: server-config
        configMap:
          name: server-config
